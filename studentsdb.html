<!-- بداية شجون -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الطالبات</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">

<style>

/*بداية شجون*/
:root {
  --bg: #f0f2f8;
  --white: #ffffff;
  --accent: #1b7c80;
  --accent-light: #e6fafb;
  --text: #1e1e2e;
  --muted: #6b7280;
  --border: #e5e7eb;
  --shadow: 0 2px 16px rgba(0,0,0,0.08);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Tajawal',sans-serif;
background:var(--bg);
min-height:100vh;
max-width:430px;
margin:auto;
color:var(--text);
}

/* HEADER */

.header{
background:var(--accent);
position:sticky;
top:0;
z-index:100;
}

.header-inner{
display:flex;
align-items:center;
justify-content:space-between;
padding:16px 18px;
}

.header h1{
font-size:18px;
font-weight:700;
color:#fff;
}

.back-btn{
background:rgba(255,255,255,0.18);
border-radius:50%;
width:38px;
height:38px;
display:flex;
align-items:center;
justify-content:center;
}

.back-btn svg{
width:20px;
stroke:#fff;
fill:none;
stroke-width:2.5;
}

.section-label{
font-size:12px;
font-weight:600;
color:var(--muted);
padding:16px 18px 6px;
}

/* LIST */

.list{
padding:4px 14px 100px;
display:flex;
flex-direction:column;
gap:11px;
}

.card{
background:var(--white);
border-radius:18px;
padding:14px;
display:flex;
align-items:center;
gap:13px;
box-shadow:var(--shadow);
cursor:pointer;
}

.icon-box{
width:54px;
height:54px;
border-radius:14px;
background:var(--accent-light);
display:flex;
align-items:center;
justify-content:center;
}

.grade-num{
font-size:20px;
font-weight:800;
color:var(--accent);
}

.info{flex:1;}

.info .name{
font-size:15px;
font-weight:700;
}

.info .meta{
font-size:12px;
color:var(--muted);
}

.arrow-btn{
background:var(--accent-light);
border-radius:12px;
width:38px;
height:38px;
display:flex;
align-items:center;
justify-content:center;
}

.arrow-btn svg{
width:16px;
stroke:var(--accent);
fill:none;
stroke-width:2.5;
}

/* STUDENTS */

.student-card{
background:white;
border-radius:18px;
margin:4px 14px 100px;
box-shadow:var(--shadow);
overflow:hidden;
}

.student-row{
display:flex;
align-items:center;
gap:13px;
padding:14px 16px;
border-bottom:1px solid var(--border);
}

.student-avatar{
width:46px;
height:46px;
border-radius:50%;
background:var(--accent-light);
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
}

.student-info{flex:1;}

.student-name{
font-size:15px;
font-weight:700;
}

.student-meta{
font-size:12px;
color:var(--muted);
}

.bus-badge{
background:var(--accent-light);
color:var(--accent);
font-size:12px;
font-weight:700;
padding:4px 12px;
border-radius:20px;
}

.empty{
text-align:center;
padding:30px;
color:var(--muted);
}

.loading{
text-align:center;
padding:30px;
color:var(--muted);
}
/* نهاية شجون */

</style>

</head>

<body>

<div class="header">
<div class="header-inner">

<a href="javascript:void(0)" class="back-btn" id="backBtn">
<svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
</a>

<h1 id="pageTitle">الطالبات</h1>

<div style="width:38px"></div>

</div>
</div>

<div class="section-label" id="sectionLabel">قائمة الصفوف</div>

<div class="list" id="gradeList">
<div class="loading">جاري تحميل البيانات...</div>
</div>

<div id="studentList" style="display:none"></div>

<script>

let students = {};

// جلب البيانات من قاعدة البيانات
async function loadData(){

try{

const response = await fetch("api.php");

if(!response.ok) throw new Error();

const data = await response.json();

students = data;

displayGrades();

}catch(e){

document.getElementById("gradeList").innerHTML =
'<p class="empty">تعذر الاتصال بقاعدة البيانات</p>';

}

}

// عرض الصفوف
function displayGrades(){

const grades = {};

Object.values(students).forEach(s=>{
if(!grades[s.grade]) grades[s.grade]=0;
grades[s.grade]++;
});

const container=document.getElementById("gradeList");
container.innerHTML="";

Object.keys(grades).forEach(g=>{

const card=document.createElement("div");

card.className="card";

card.onclick=()=>showStudents(g);

card.innerHTML=`

<div class="icon-box">
<span class="grade-num">${g}</span>
</div>

<div class="info">
<div class="name">الصف ${g}</div>
<div class="meta">${grades[g]} طالبات</div>
</div>

<div class="arrow-btn">
<svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
</div>

`;

container.appendChild(card);

});

}

// عرض الطالبات
function showStudents(grade){

const list=Object.values(students).filter(s=>s.grade==grade);

document.getElementById("pageTitle").innerText=`طالبات الصف ${grade}`;
document.getElementById("sectionLabel").innerText="قائمة الطالبات";

document.getElementById("gradeList").style.display="none";

const rows=list.map(s=>`

<div class="student-row">

<div class="student-avatar">👧</div>

<div class="student-info">
<div class="student-name">${s.name}</div>
<div class="student-meta">الصف ${s.grade}</div>
</div>

<span class="bus-badge">باص ${s.bus}</span>

</div>

`).join("");

document.getElementById("studentList").innerHTML=
`<div class="student-card">${rows}</div>`;

document.getElementById("studentList").style.display="block";

document.getElementById("backBtn").onclick=showGrades;

}

// الرجوع
function showGrades(){

document.getElementById("pageTitle").innerText="الطالبات";
document.getElementById("sectionLabel").innerText="قائمة الصفوف";

document.getElementById("gradeList").style.display="flex";
document.getElementById("studentList").style.display="none";

document.getElementById("backBtn").onclick=()=>history.back();

}

document.getElementById("backBtn").onclick=()=>history.back();

loadData();

</script>
 <script src="db.js"></script>
</body>
</html>
<!-- نهاية شجون -->
