<!doctype html>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    :root {
  --bg: #f0f2f8;
  --white: #ffffff;
  --accent: #1b7c80;
  --accent-light: #e6fafb;
  --text: #1e1e2e;
  --muted: #6b7280;
  --border: #e5e7eb;
  --shadow: 0 2px 16px rgba(0,0,0,0.08);
}


/* HEADER */
.header {
  background: var(--accent);
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 18px;
}

.header h1 {
  font-family: 'Tajawal', sans-serif;
  font-size: 18px;
  
  font-weight: 700;
  color: #fff;

}

.back-btn {
  background: rgba(255,255,255,0.18);
  border: none;
  border-radius: 50%;
  width: 38px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background 0.2s;
  text-decoration: none;
}

.back-btn:active { background: rgba(255,255,255,0.3); }
.back-btn svg {
  width: 20px;
  height: 20px;
  stroke: #fff;
  fill: none;
  stroke-width: 2.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.header-spacer { width: 38px; }

nav {
  padding: 10px;
    text-align: center;
}

nav a {
  margin: 0 10px;
  color: #ffffff;
  font-weight: bold;
}

    body {
      font-family: 'Tajawal', sans-serif;
  background-color: #f2f2f2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      direction: rtl;
    }

    .phone {
      width: 100%;
      padding: 1.5rem;
    }

    .splash-card {
      padding: 3rem 2rem;
      text-align: center;
    }



    .logo {
      width: 120px;
      height: auto;
      margin-bottom: 20px;
    }

    .logo-label {
      font-size: 0.78rem;
      color: #2a9d8f;
      font-weight: 500;
      margin-top: 6px;
    }

    h1.app-title {
      font-size: 1.8rem;
      font-weight: 800;
      color: #1a1a2e;
      letter-spacing: 0.01em;
    }

    p.tagline {
      font-size: 1rem;
      color: #6b7280;
      font-weight: 400;
      line-height: 1.8;
    }

    .btn {
      display: block;
      width: 100%;
      margin-top: 0.8rem;
      padding: 0.9rem 1rem;
      background-color: #2a9d8f;
      color: #ffffff;
      font-family: 'Tajawal', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      text-align: center;
      text-decoration: none;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover {
      background-color: #21867a;
    }
  
  </style>
</head>
