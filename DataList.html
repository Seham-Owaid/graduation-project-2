<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة البيانات</title>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Tajawal', sans-serif;
            background: #f2f2f2;
        }

        /* الشريط العلوي */

        .header {
            background: #1b7c80;
            color: white;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            font-size: 20px;
            font-weight: bold;
        }

        .back-btn {
            position: absolute;
            right: 15px;
            background: none;
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
        }

        /* المحتوى */

        .container {
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        .title {
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            max-width: 500px;
            margin: auto;
        }

        .card {
            background: #ffffff;
            border-radius: 15px;
            border: 1px solid #ddd;
            padding: 20px;
            text-align: center;
        }

        .card img {
            width: 70px;
            margin-bottom: 10px;
        }

        .card p {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
        }

        /* الشريط السفلي */

        .bottom-nav {
            position: fixed;
            bottom: 0;
            right: 0;
            left: 0;
            background: #ffffff;
            border-top: 1px solid #ddd;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
        }

        .nav-item {
            text-decoration: none;
            color: #777;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 14px;
        }

        .nav-item span {
            font-size: 20px;
            margin-bottom: 3px;
        }

        .active {
            color: #1b7c80;
        }
    </style>
</head>

<body>

    <div class="header">

        <button class="back-btn" onclick="history.back()">←</button>

        قائمة البيانات

    </div>

    <div class="container">

        <div class="grid">

            <div class="card">
                <img src="http://localhost/ayn-raqeeb-frontend/images/students.png">
                <p>الطالبات</p>
            </div>

            <div class="card">
                <img src="http://localhost/ayn-raqeeb-frontend/images/bus.png">
                <p>الباصات</p>
            </div>

            <div class="card">
                <img src="http://localhost/ayn-raqeeb-frontend/images/map.png">
                <p>خريطة التتبع</p>
            </div>

            <div class="card">
                <img src="http://localhost/ayn-raqeeb-frontend/images/fees.png">
                <p>الرسوم</p>
            </div>

        </div>

    </div>

    <div class="bottom-nav">

        <a href="profile.html" class="nav-item">
            <span>👤</span>
            <p>حسابي</p>
        </a>

        <a href="records.html" class="nav-item">
            <span>📋</span>
            <p>سجلاتي</p>
        </a>

        <a href="home.html" class="nav-item active">
            <span>🏠</span>
            <p>الرئيسية</p>
        </a>

    </div>
<script src="db.js"></script>
</body>

</html>
<!-- نهاية شجون -->
