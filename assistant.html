<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>المساعد الذكي — عين رقيب</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --teal: #1b7c80;
      --dark: #1a2340;
      --bg: #f0f2f5;
      --white: #ffffff;
      --gray: #b0b8c1;
      --gray-light: #eaedf2;
      --shadow: 0 4px 18px rgba(0,0,0,0.07);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: 'Tajawal', sans-serif;
      background: var(--bg);
      width: 100%;
      height: 100%;
      height: 100dvh;
      overflow: hidden;
    }

    .phone {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      background: var(--bg);
      border-radius: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    .header {
      background: #1b7c80;
      padding: env(safe-area-inset-top, 0px) 22px 14px;
      padding-top: max(env(safe-area-inset-top, 0px), 14px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    @media (min-width: 600px) { .header { padding: 18px 32px; } }
    @media (min-width: 1024px) { .header { padding: 20px 48px; } }

    .avatar-btn {
      width: 46px; height: 46px;
      border-radius: 8px;
      background: #eef3ff;
      border: 1px solid #d0d8f0;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      cursor: pointer;
      transition: transform 0.15s;
      overflow: hidden;
      flex-shrink: 0;
    }
    .avatar-btn:hover { transform: scale(1.06); }

    .header-title {
      color: white;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    @media (min-width: 600px) { .header-title { font-size: 19px; } .avatar-btn { width: 50px; height: 50px; } }
    @media (min-width: 1024px) { .header-title { font-size: 21px; } .avatar-btn { width: 54px; height: 54px; } }

    .menu-dots {
      font-size: 26px;
      font-weight: 900;
      color: white;
      cursor: pointer;
      line-height: 1;
      letter-spacing: 1px;
      padding: 4px 6px;
      border-radius: 6px;
      transition: background 0.15s;
    }
    .menu-dots:hover { background: rgba(255,255,255,0.15); }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 22px 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: var(--bg);
      scrollbar-width: thin;
      scrollbar-color: var(--gray-light) transparent;
      -webkit-overflow-scrolling: touch;
    }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--gray-light); border-radius: 4px; }

    @media (min-width: 600px) { .chat-area { padding: 28px 24px 16px; gap: 16px; } }
    @media (min-width: 1024px) { .chat-area { padding: 32px 48px 20px; gap: 18px; } }

    .bubble-wrap { display: flex; }
    .bubble-wrap.bot  { justify-content: flex-end; }
    .bubble-wrap.user { justify-content: flex-start; }

    .bubble {
      max-width: 78%;
      padding: 14px 18px;
      border-radius: 18px;
      font-size: 14.5px;
      line-height: 1.65;
      text-align: right;
      direction: rtl;
    }

    @media (min-width: 600px) { .bubble { max-width: 65%; font-size: 15px; padding: 16px 22px; } }
    @media (min-width: 1024px) { .bubble { max-width: 55%; font-size: 16px; padding: 18px 24px; } }

    .bubble.bot {
      background: var(--white);
      color: var(--dark);
      border-top-right-radius: 5px;
      box-shadow: var(--shadow);
      animation: popIn 0.28s ease;
    }
    .bubble.user {
      background: var(--teal);
      color: white;
      border-top-left-radius: 5px;
      animation: popIn 0.28s ease;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.94) translateY(6px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .typing-dots { display: flex; gap: 5px; align-items: center; padding: 4px 2px; }
    .typing-dots span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--teal);
      opacity: 0.65;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); }
      40%          { transform: translateY(-5px); }
    }

    .input-row {
      display: flex;
      align-items: center;
      padding: 10px 16px 12px;
      padding-bottom: max(12px, env(safe-area-inset-bottom, 12px));
      background: var(--bg);
      gap: 10px;
      direction: ltr;
      flex-shrink: 0;
      border-top: 1px solid var(--gray-light);
    }

    @media (min-width: 600px) { .input-row { padding: 14px 24px 16px; gap: 12px; } }
    @media (min-width: 1024px) { .input-row { padding: 16px 48px 18px; gap: 14px; } }

    .send-btn {
      width: 50px; height: 50px;
      border-radius: 50%;
      background: var(--teal);
      border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(58,191,191,0.45);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .send-btn:hover { transform: scale(1.08); box-shadow: 0 6px 20px rgba(58,191,191,0.55); }
    .send-btn:active { transform: scale(0.96); }
    .send-btn svg { width: 20px; height: 20px; fill: white; }

    @media (min-width: 600px) { .send-btn { width: 54px; height: 54px; } .send-btn svg { width: 22px; height: 22px; } }

    .chat-input {
      flex: 1;
      background: var(--white);
      border: 1.5px solid var(--gray-light);
      border-radius: 8px;
      padding: 13px 20px;
      font-family: 'Tajawal', sans-serif;
      font-size: 14px;
      color: var(--dark);
      outline: none;
      direction: rtl;
      text-align: right;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .chat-input:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(58,191,191,0.12); }
    .chat-input::placeholder { color: #c8cdd4; }

    @media (min-width: 600px) { .chat-input { font-size: 15px; padding: 14px 22px; } }
    @media (min-width: 1024px) { .chat-input { font-size: 16px; padding: 16px 24px; } }

    .bottom-nav {
      background: var(--white);
      border-top: 1px solid var(--gray-light);
      display: flex;
      flex-shrink: 0;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 4px 8px;
      gap: 3px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .nav-item:hover { background: #f7f9fb; }
    .nav-icon  { font-size: 21px; color: var(--gray); }
    .nav-label { font-size: 11px; font-family: 'Tajawal', sans-serif; color: var(--gray); }
    .nav-item.active .nav-label { color: var(--teal); font-weight: 700; }

    @media (min-width: 600px) { .nav-item { padding: 12px 8px 10px; } .nav-icon { font-size: 23px; } .nav-label { font-size: 12px; } }
    @media (min-width: 1024px) { .nav-item { padding: 14px 12px 12px; } .nav-icon { font-size: 25px; } .nav-label { font-size: 13px; } }

    .phone-body {
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }
    .fab {
      position: absolute;
      left: 16px;
      bottom: 76px;
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--teal);
      border: none;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 6px 22px rgba(58,191,191,0.55);
      z-index: 10;
      transition: transform 0.2s, box-shadow 0.2s;
      animation: fabPop 0.4s cubic-bezier(.34,1.56,.64,1);
    }
    .fab:hover { transform: scale(1.1); box-shadow: 0 8px 28px rgba(58,191,191,0.65); }
    .fab:active { transform: scale(0.94); }
    @keyframes fabPop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .fab-tooltip {
      position: absolute;
      left: 76px;
      bottom: 96px;
      background: var(--dark);
      color: white;
      font-family: 'Tajawal', sans-serif;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      padding: 6px 14px;
      border-radius: 8px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 11;
    }
    .fab:hover + .fab-tooltip, .fab-tooltip.show { opacity: 1; }
    @media (min-width: 1024px) { .fab { left: 32px; bottom: 90px; width: 62px; height: 62px; font-size: 26px; } }
  </style>
</head>

      <!-- Floating AI Button -->
      <button class="fab" id="fab" onclick="toggleChat()" title="المساعد الذكي">💬</button>
      <div class="fab-tooltip" id="fabTooltip">المساعد الذكي</div>

    </div>
  </div>

  <script>
    const fab = document.getElementById('fab');
    const tooltip = document.getElementById('fabTooltip');
    fab.addEventListener('mouseenter', () => tooltip.classList.add('show'));
    fab.addEventListener('mouseleave', () => tooltip.classList.remove('show'));

    function toggleChat() {
      fab.style.transform = 'scale(0.9)';
      setTimeout(() => fab.style.transform = '', 150);
    }

    const replies = [
      'بالتأكيد! يمكنني مساعدتك في تتبع وصول الطالب.',
      'موقع الباص الآن في طريقه إلى المنزل، المتبقي حوالي 3 دقائق.',
      'هل تريد معرفة تفاصيل رحلة اليوم؟',
      'يمكنك تفعيل الإشعارات لتصلك تنبيهات فورية.',
      'خدمتك دائماً! هل لديك استفسار آخر؟',
    ];
    let idx = 0;

    function sendMessage() {
      const input = document.getElementById('chatInput');
      const text  = input.value.trim();
      if (!text) return;

      const area = document.getElementById('chatArea');

      const userDiv = document.createElement('div');
      userDiv.className = 'bubble-wrap user';
      userDiv.innerHTML = `<div class="bubble user">${text}</div>`;
      area.appendChild(userDiv);
      input.value = '';
      area.scrollTop = area.scrollHeight;

      const typingDiv = document.createElement('div');
      typingDiv.className = 'bubble-wrap bot';
      typingDiv.id = 'typing';
      typingDiv.innerHTML = `<div class="bubble bot"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
      area.appendChild(typingDiv);
      area.scrollTop = area.scrollHeight;

      setTimeout(() => {
        document.getElementById('typing')?.remove();
        const botDiv = document.createElement('div');
        botDiv.className = 'bubble-wrap bot';
        botDiv.innerHTML = `<div class="bubble bot">${replies[idx % replies.length]}</div>`;
        area.appendChild(botDiv);
        area.scrollTop = area.scrollHeight;
        idx++;
      }, 950);
    }
  </script>
<script src="db.js"></script>
