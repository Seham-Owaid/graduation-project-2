<!-- بدايه فتون -->
<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>تسجيل دخول ولي الأمر</title>
  <link rel="stylesheet" href="parent-login.css">
</head>
<body>
  <div class="container">
  <img src="eyelogo.png" alt="شعار" class="logo">

    <h1>تسجيل دخول ولي الأمر</h1>

    <form id="loginForm" class="login-form" autocomplete="off">
      <input id="userid" name="userid" type="text" inputmode="numeric" maxlength="5" placeholder="رقم المستخدم (ID)" required>

      <div class="password-wrapper">
        <input id="nationalid" name="nationalid"
               type="password"
               inputmode="numeric"
               pattern="\d{10}"
               maxlength="10"
               placeholder="رقم الهوية الوطنية (كلمة المرور)" required>

        <button id="toggleEye" class="pw-toggle" type="button" aria-label="إظهار/إخفاء كلمة المرور">
          <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"></path><circle cx="12" cy="12" r="3"></circle></svg>
        </button>
      </div>

      <div id="nationalid-msg" aria-live="polite" class="nationalid-msg"></div>

      <button id="submitBtn" type="submit" class="submit">تسجيل الدخول</button>
    </form>
    <script>
            // تفعيل زر العين لإظهار/إخفاء كلمة المرور
            const passwordInput = document.getElementById('nationalid');
            const toggleEye = document.getElementById('toggleEye');
            toggleEye.addEventListener('click', function() {
              if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
              } else {
                passwordInput.type = 'password';
              }
            });
      // عند بدء الكتابة في حقل المستخدم، أضف PA تلقائياً في البداية، واسمح فقط بـ 3 أرقام بعدها
      const userIdInput = document.getElementById('userid');
      userIdInput.addEventListener('input', function(e) {
          let val = this.value.replace(/[^\d]/g, '');
        if (val.length > 3) val = val.slice(0, 3);
        this.value = val ? 'PA' + val : '';
      });
      userIdInput.addEventListener('focus', function() {
        if (!this.value) this.value = 'PA';
      });
      userIdInput.addEventListener('blur', function() {
        if (this.value === 'PA') this.value = '';
      });
        // قاعدة بيانات الحسابات (ثابتة)
        const parentAccount = {userId: 'PA504', nationalId: '1111111111'};
        document.getElementById('loginForm').addEventListener('submit', function(e) {
          e.preventDefault();
          const userId = userIdInput.value.trim();
          const national = document.getElementById('nationalid').value.trim();
          const msg = document.getElementById('nationalid-msg');
          msg.textContent = '';
          msg.style.color = '#c00';
          // تحقق من صحة الإدخال فقط عند الضغط على زر تسجيل الدخول
          if (!/^PA\d{3}$/.test(userId)) {
            msg.textContent = 'رقم المستخدم يجب أن يبدأ بـ PA ويتكون من 3 أرقام بعدها';
            userIdInput.focus();
            return;
          }
          if (!/^\d{10}$/.test(national)) {
            msg.textContent = 'رقم الهوية يجب أن يتكون من 10 أرقام';
            document.getElementById('nationalid').focus();
            return;
          }
          // تحقق من الحساب
          if (userId !== parentAccount.userId || national !== parentAccount.nationalId) {
            msg.textContent = 'لا يوجد حساب بهذا الرقم أو كلمة المرور غير صحيحة.';
            msg.style.color = '#c00';
            return;
          }
          // إذا كان الحساب صحيح تظهر رسالة التحقق وينتقل للواجهة
          msg.style.color = '#0a0';
          msg.textContent = 'تم التحقق.';
          setTimeout(function() {
            window.location.href = 'attendance.html';
          }, 600);
      });
    </script>
    <!-- تم حذف السكريبت الثاني لمنع الانتقال المباشر -->
  </div>
</div>
 <script src="db.js"></script>
</body>
</html>
  <!-- نهاية فتون -->
