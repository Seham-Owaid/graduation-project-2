<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>الطالبات</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="students.css" />
  <style>
    /* الحل النهائي للمربعات الرمادية */
    .icon-box, .student-avatar-img {
      background-color: white !important; /* يجبر الخلفية تكون بيضاء سادة */
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px; /* تناسب شكل الكرت */
    }

    .icon-box img, .student-avatar-img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* يخلي الصورة تغطي المربعات الرمادية */
      display: block;
    }

    .section-header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
    }

    .add-student-btn {
      background-color: #1b7c80;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 10px;
      font-family: 'Tajawal', sans-serif;
      font-weight: bold;
      cursor: pointer;
    }

    .student-row {
      display: flex;
      align-items: center;
      padding: 15px;
      border-bottom: 1px solid #eee;
      background: white;
      margin-bottom: 10px;
      border-radius: 12px;
    }

    /* تعديل مقاس صورة الطالبة في القائمة الداخلية */
    .student-avatar-img {
      width: 45px;
      height: 45px;
      margin-left: 15px;
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="header-inner">
      <a href="javascript:void(0)" class="back-btn" id="backBtn">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </a>
      <h1 id="pageTitle">الطالبات</h1>
      <div class="header-spacer"></div>
    </div>
  </div>

  <div class="section-header-row">
    <div class="section-label" id="sectionLabel">قائمة الصفوف</div>
    <button class="add-student-btn" id="addBtn" onclick="addNewStudent()">+ إضافة طالبة</button>
  </div>

  <div class="list" id="gradeList">
    <script>
      const grades = ["الأول", "الثاني", "الثالث", "الرابع", "الخامس", "السادس"];
      grades.forEach((name, i) => {
        const num = i + 1;
        document.write(`
          <div class="card" onclick="showStudents('${num}')">
            <div class="icon-box"><img src="student.png" alt="icon"></div>
            <div class="info">
              <div class="name">الصف ${name} الابتدائي</div>
              <div class="meta" id="count-${num}">3 طالبات</div>
            </div>
            <div class="arrow-btn"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
          </div>
        `);
      });
    </script>
  </div>

  <div id="studentList" style="display:none; padding: 10px;"></div>

  <script>
    const gradeNames = { "1": "الأول", "2": "الثاني", "3": "الثالث", "4": "الرابع", "5": "الخامس", "6": "السادس" };
    const studentIconPath = "student.png"; 
    
    const studentsByGrade = {
      "1": [{ name: "جود العتيبي", bus: 12 }, { name: "لانا الشهراني", bus: 15 }, { name: "رهف المالكي", bus: 9 }],
      "2": [{ name: "ريم الحارثي", bus: 12 }, { name: "دانة العتيبي", bus: 7 }, { name: "سارة الغامدي", bus: 15 }],
      "3": [{ name: "نورة الشهري", bus: 9 }, { name: "هيا العتيبي", bus: 12 }, { name: "لمى الحربي", bus: 7 }],
      "4": [{ name: "شهد الزهراني", bus: 15 }, { name: "جنى الغامدي", bus: 9 }, { name: "غلا الحارثي", bus: 12 }],
      "5": [{ name: "أريام العتيبي", bus: 7 }, { name: "ليان الشهري", bus: 15 }, { name: "تالا الحربي", bus: 9 }],
      "6": [{ name: "لميس الغامدي", bus: 12 }, { name: "رهف الشهري", bus: 7 }, { name: "رزان الحارثي", bus: 15 }]
    };

    function showStudents(grade) {
      const list = studentsByGrade[grade] || [];
      const label = gradeNames[grade];
      document.getElementById('pageTitle').innerText = "طالبات الصف " + label;
      document.getElementById('gradeList').style.
      display = 'none';
      document.getElementById('addBtn').style.display = 'none';
      document.getElementById('studentList').style.display = 'block';
      document.getElementById('backBtn').onclick = showGrades;

      let rows = list.map((s) => `
        <div class="student-row">
          <img src="${studentIconPath}" alt="طالبة" class="student-avatar-img">
          <div style="flex:1;">
            <div style="font-weight:bold; color:#333;">${s.name}</div>
            <div style="font-size:12px; color:#1b7c80;">باص ${s.bus}</div>
          </div>
        </div>
      `).join('');
      
      document.getElementById('studentList').innerHTML = rows || '<p style="text-align:center;">لا توجد طالبات.</p>';
    }

    function showGrades() {
      document.getElementById('pageTitle').innerText = 'الطالبات';
      document.getElementById('gradeList').style.display = 'flex';
      document.getElementById('addBtn').style.display = 'block';
      document.getElementById('studentList').style.display = 'none';
      document.getElementById('backBtn').onclick = () => history.back();
    }

    function addNewStudent() {
      const name = prompt("أدخلي اسم الطالبة:");
      if (!name) return;
      const grade = prompt("أدخلي رقم الصف (1-6):");
      if (!grade || !studentsByGrade[grade]) { alert("رقم الصف غير صحيح!"); return; }
      const bus = prompt("أدخلي رقم الباص:");
      if (!bus) return;

      studentsByGrade[grade].push({ name, bus });
      document.getElementById(`count-${grade}`).innerText = studentsByGrade[grade].length + " طالبات";
      alert("تمت الإضافة بنجاح!");
    }

    document.getElementById('backBtn').onclick = () => history.back();
  </script>
</body>
</html>
