<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="attendance-responsive.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تطبيق عين رقيب</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f2f8;
            --white: #ffffff;
            --accent: #1b7c80;
            --accent-light: #e6fafb;
            --paid: #16a34a;
            --paid-bg: #dcfce7;
            --unpaid: #dc2626;
            --unpaid-bg: #fee2e2;
            --text: #1e1e2e;
            --muted: #6b7280;
            --border: #e5e7eb;
            --shadow: 0 2px 16px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            width: 100%;
            margin: 0 auto;
            color: var(--text);
        }

        .header {
            background: var(--accent);
            position: sticky;
            top: 0;
            z-index: 100;
            width: 100%;
            max-width: none;
            margin: 0 auto;
        }

        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 18px;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
        }

        .back-btn {
            background: rgba(255,255,255,0.18);
            border: none;
            border-radius: 50%;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .back-btn:active { background: rgba(255,255,255,0.3); }
        .back-btn svg { width: 20px; height: 20px; stroke: #fff; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-logo span {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
        }

        .content {
            padding: 22px 20px 96px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
            max-width: none;
            margin: 0 auto;
            border-radius: 0;
            border: none;
            direction: rtl;
            align-items: center;
            min-height: calc(100vh - 70px);
            text-align: center;
            position: relative;
            background: var(--white);
        }

        .student-card {
            background: var(--white);
            border-radius: 8px;
            box-shadow: var(--shadow);
            overflow: hidden;
            animation: slideUp 0.35s ease both;
            padding: 12px 18px 12px 12px;
            margin-top: 0;
            text-align: right;
            width: 100%;
            max-width: 680px;
            color: var(--muted);
            border: 2px solid var(--muted);
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: center;
            min-height: 19px;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .student-image-container {
            width: 100%;
            height: 220px;
            overflow: hidden;
        }

        .student-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .student-details {
            padding: 16px 18px 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .detail-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: var(--bg);
            border-radius: 12px;
            width: 100%;
        }

        .detail-row .label {
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
        }

        .detail-row .value {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
        }

        .status-actions {
            display: flex;
            gap: 12px;
            animation: slideUp 0.35s ease both;
            animation-delay: 0.1s;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 16px;
            font-family: 'Tajawal', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: var(--shadow);
        }

        .btn:active { transform: scale(0.96); }

        .btn-present {
            background: var(--paid);
            color: #fff;
        }

        .btn-present:hover { background: #15803d; }

        .btn-absent {
            background: var(--unpaid);
            color: #fff;
        }

        .btn-absent:hover { background: #b91c1c; }

        .status-feedback {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 13px 16px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            animation: slideUp 0.3s ease both;
        }

        .status-feedback.show { display: flex; }
        .status-feedback.present { background: var(--paid-bg); color: var(--paid); }
        .status-feedback.absent  { background: var(--unpaid-bg); color: var(--unpaid); }

        .status-feedback .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .present .dot { background: var(--paid); }
        .absent  .dot { background: var(--unpaid); }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: none;
            background: var(--white);
            border-top: 1px solid var(--border);
            padding: 10px 24px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 -2px 16px rgba(0,0,0,0.06);
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 12px;
            transition: background 0.2s;
        }

        .nav-item:active { background: var(--accent-light); }

        .nav-item svg {
            width: 22px;
            height: 22px;
            stroke: var(--muted);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: stroke 0.2s;
        }

        .nav-item.active svg { stroke: var(--accent); }

        .nav-item span {
            font-size: 10px;
            font-weight: 500;
            color: var(--muted);
            transition: color 0.2s;
        }

        .nav-item.active span { color: var(--accent); }
                @media (max-width:480px){
                    .content{padding:14px 14px 86px}
                    .header{max-width:100%}
                    .student-card{border-radius:14px}
                    .student-details{padding:12px 10px 14px}
                    .detail-row{padding:8px 8px}
                    .status-actions{gap:8px}
                    .btn{padding:10px;font-size:15px}
                    .bottom-nav{max-width:100%;padding:8px 10px}
                }

                @media (min-width:481px) and (max-width:900px){
                    .content{padding:18px 18px 90px;max-width:96vw}
                    .student-card{border-radius:18px}
                    .student-details{padding:14px 14px 16px}
                    .detail-row{padding:10px 10px}
                    .status-actions{gap:10px}
                    .btn{padding:12px;font-size:16px}
                    .bottom-nav{max-width:96vw;padding:10px 18px}
                }

                @media (min-width:901px){
                    .content{padding:22px 20px 96px;max-width:none}
                    .student-card{border-radius:8px}
                    .student-details{padding:16px 18px 18px}
                    .detail-row{padding:10px 14px}
                    .status-actions{gap:14px}
                    .btn{padding:14px;font-size:16px}
                    .bottom-nav{max-width:none;padding:10px 24px}
                }
    </style>
</head>
<body>

<div class="header">
    <div class="header-inner">
        <button class="back-btn" onclick="history.back()">
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="header-logo">
            <span>عين رقيب</span>
        </div>
        <button class="back-btn">
            <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </button>
    </div>
</div>

<main class="content">

    <div class="student-card" style="margin-top:0;">
        <div class="student-image-container" style="display:flex;align-items:center;justify-content:center;width:100%;height:220px;overflow:hidden;">
            <img src="studenta.png" alt="صورة طالب" class="student-img" style="max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;display:block;">
        </div>
        <div class="student-details">
            <div class="detail-row">
                <span class="label">الاسم</span>
                <span class="value">شهد سلطان</span>
            </div>
            <div class="detail-row">
                <span class="label">الصف</span>
                <span class="value">ثالث متوسط</span>
            </div>
            <div class="detail-row">
                <span class="label">رقم الباص</span>
                <span class="value">23</span>
            </div>
        </div>
    </div>

    <div class="status-feedback" id="statusFeedback">
        <span class="dot"></span>
        <span id="statusText"></span>
    </div>

    <div class="status-actions" style="width:100%;max-width:680px;display:flex;flex-direction:row;gap:14px;margin:0 auto;">
        <button id="presentBtn" class="btn btn-present" onclick="askParent('present')" style="width:50%;">حاضر</button>
        <button id="absentBtn" class="btn btn-absent" onclick="askParent('absent')" style="width:50%;">غائب</button>
    </div>

    <!-- نافذة السؤال للوالدين -->
    <div id="modalOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:9999;align-items:flex-end;justify-content:center;">
        <div style="background:#fff;width:100%;border-radius:28px 28px 0 0;padding:28px 24px 48px;display:flex;flex-direction:column;align-items:center;gap:20px;direction:rtl;">
            <div id="modalIcon" style="width:68px;height:68px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;"></div>
            <div id="modalTitle" style="font-size:20px;font-weight:800;"></div>
            <div id="modalQuestion" style="font-size:15px;color:#6b7280;text-align:center;line-height:1.7;"></div>
            <div style="font-size:18px;font-weight:800;color:#1b7c80;background:#e6fafb;padding:8px 24px;border-radius:12px;">شهد سلطان</div>
            <div style="display:flex;gap:12px;width:100%;">
                <button id="confirmBtn" onclick="confirmStatus()" style="flex:1;padding:15px;border:none;border-radius:16px"></button>
                <button onclick="closeModal()" style="flex:1;padding:15px;border:none;border-radius:16px;background:#e5e7eb;color:#1e1e2e;font-weight:700;">إلغاء</button>
            </div>
        </div>
    </div>

</main>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="window.location.href='attendance.html'">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>الرئيسية</span>
    </div>
    <div class="nav-item" onclick="window.location.href='tracking.html'">
        <svg viewBox="0 0 24 24"><path d="M12 21s-6-5.33-6-11a6 6 0 1 1 12 0c0 5.67-6 11-6 11z"/><circle cx="12" cy="10" r="2.5"/></svg>
        <span>تتبع الباص</span>
    </div>
    <div class="nav-item" onclick="window.location.href='payment.html'">
        <svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="2" ry="2"/><circle cx="12" cy="12" r="3"/><path d="M6 10h.01"/><path d="M18 14h.01"/></svg>
        <span>الرسوم</span>
    </div>
</nav>

<script>
    let pendingStatus = null;

    function askParent(status) {
        pendingStatus = status;
        const overlay = document.getElementById('modalOverlay');
        const icon = document.getElementById('modalIcon');
        const title = document.getElementById('modalTitle');
        const question = document.getElementById('modalQuestion');
        const confirmBtn = document.getElementById('confirmBtn');

        overlay.style.display = 'flex';
        if (status === 'present') {
            icon.style.background = '#dcfce7';
            icon.textContent = '✅';
            title.textContent = 'تأكيد الحضور';
            question.textContent = 'هل تؤكد أن الطالبة ستركب الباص اليوم وستكون حاضرة؟';
            confirmBtn.style.background = '#16a34a';
            confirmBtn.textContent = '✅ نعم، حاضرة';
        } else {
            icon.style.background = '#fee2e2';
            icon.textContent = '❌';
            title.textContent = 'تأكيد الغياب';
            question.textContent = 'هل تؤكد أن الطالبة لن تأتي إلى المدرسة اليوم وستكون غائبة؟';
            confirmBtn.style.background = '#dc2626';
            confirmBtn.textContent = '❌ نعم، غائبة';
        }
    }

    function confirmStatus() {
        const feedback = document.getElementById('statusFeedback');
        const text = document.getElementById('statusText');
        const overlay = document.getElementById('modalOverlay');

        feedback.classList.remove('show', 'present', 'absent');
        overlay.style.display = 'none';

        if (pendingStatus === 'present') {
            feedback.classList.add('show', 'present');
            text.textContent = 'تم تسجيل الطالبة حاضرة بنجاح';
        } else {
            feedback.classList.add('show', 'absent');
            text.textContent = 'تم تسجيل الطالبة غائبة';
        }
        pendingStatus = null;
    }

    function closeModal() {
        document.getElementById('modalOverlay').style.display = 'none';
        pendingStatus = null;
    }
</script>
<script src="db.js"></script>
</body>
</html>
