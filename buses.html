<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>الباصات</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="students.css" />
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="header-inner">
      <a href="javascript:void(0)" class="back-btn" id="backBtn" aria-label="رجوع">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </a>
      <h1 id="pageTitle">الباصات</h1>
      <div class="header-spacer"></div>
    </div>
  </div>

  <div class="section-label" id="sectionLabel">قائمة الباصات</div>

  <!-- BUS LIST (default view) -->
  <div class="list" id="busList">

    <div class="card" onclick="window.location.href='bus-details.html?bus=20'">
      <div class="icon-box" style="background: none; padding: 0;">
        <img src="images/bus.jpg" alt="Bus" style="width: 100%; height: 100%; border-radius: 14px; object-fit: cover;">
      </div>
      <div class="info">
        <div class="name">باص رقم 20</div>
        <div class="meta">المقاعد: 18 | المتاحة: 0</div>
      </div>
      <div class="arrow-btn">
        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </div>

    <div class="card" onclick="window.location.href='bus-details.html?bus=21'">
      <div class="icon-box" style="background: none; padding: 0;">
        <img src="images/bus.jpg" alt="Bus" style="width: 100%; height: 100%; border-radius: 14px; object-fit: cover;">
      </div>
      <div class="info">
        <div class="name">باص رقم 21</div>
        <div class="meta">المقاعد: 18 | المتاحة: 5</div>
      </div>
      <div class="arrow-btn">
        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </div>

  </div>

  <script>
    // الوضع الافتراضي للرجوع
    document.getElementById('backBtn').onclick = () => { window.location.href = 'list.html'; };
  </script>

</body>
</html>
<!-- نهاية شجون -->
